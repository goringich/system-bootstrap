# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/00-Default.conf
include ./scale-generated.conf

font_family FantasqueSansM Nerd Font Mono Bold
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1
cursor_shape beam

# The current NVIDIA/Hyprland session is crashing kitty in glfw-wayland.so
# while creating new windows. Keep kitty on XWayland until that stack is stable.
linux_display_server x11

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

selection_foreground none
selection_background none

# Terminal clipboard shortcuts on Russian layout
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard

foreground #dddddd
background #000000
cursor #dddddd
