# /* ---- custom cinematic motion ---- */  #

animations {
  enabled = yes

  bezier = wind, 0.05, 0.95, 0.1, 1.05
  bezier = winIn, 0.08, 1.22, 0.18, 1.02
  bezier = winOut, 0.32, -0.12, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = overshot, 0.18, 1.02, 0.12, 1.12
  bezier = smoothOut, 0.22, 1, 0.36, 1
  bezier = smoothIn, 0.28, 0.82, 0.2, 1
  bezier = menuIn, 0.16, 1, 0.24, 1.04
  bezier = menuOut, 0.4, 0, 0.7, 1

  animation = windows, 1, 9, wind, slide
  animation = windowsIn, 1, 8, winIn, popin 82%
  animation = windowsOut, 1, 7, winOut, popin 88%
  animation = windowsMove, 1, 8, overshot, slide
  animation = border, 1, 5, smoothOut
  animation = borderangle, 1, 220, liner, loop
  animation = fade, 1, 7, smoothOut
  animation = fadeDim, 1, 6, smoothIn
  animation = layersIn, 1, 7, menuIn, slidefade
  animation = layersOut, 1, 5, menuOut
  animation = fadeLayersIn, 1, 6, menuIn
  animation = fadeLayersOut, 1, 4, menuOut
  animation = workspaces, 1, 8, overshot, slidefade 22%
  animation = specialWorkspace, 1, 8, overshot, slidefade 35%

  # animations for -git or version >0.42.0
  animation = workspacesIn, 1, 7, menuIn, slidefade
  animation = workspacesOut, 1, 6, menuOut, slidefade
}
