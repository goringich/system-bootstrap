# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User startup additions only.
# Base startup commands are already loaded from ~/.config/hypr/configs/Startup_Apps.conf.
# Keep this file lean to avoid duplicate daemons and extra heat/load.
# Session safe mode intentionally keeps the desktop minimal after a dirty
# shutdown or Hyprland/GPU crash so the next login does not immediately
# reproduce the same failure pattern.

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

# Extra tray/panel apps not enabled in vendor defaults
exec-once = bash -lc "bash $scriptsDir/SessionStartupGuard.sh init"
exec-once = bash -lc "sleep 1; $scriptsDir/SyncAppScaling.sh"
exec-once = bash -lc "sleep 2; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal wallpaper-restore '$HOME/.config/hypr/scripts/RestoreWallpaper.sh'"
exec-once = bash -lc "sleep 3; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal rog-control-center 'rog-control-center'"
# Keep swaync blocked for now. Historical tests on this machine showed
# `waybar on / swaync off` was materially more stable, and 2026-04-01 added
# fresh Xid hits with `swaync` named in the fault window.
# Re-enable with:
#   bash ~/.config/hypr/scripts/SessionDiagnosticMode.sh enable-swaync-only
# or by restoring the guarded release below.
#exec-once = bash -lc "sleep 24; bash $scriptsDir/SessionStartupGuard.sh release-swaync-after-startup-grace"
# Waybar is essential UI, so keep it available even in session safe mode.
# Start it later than the rest of the shell/session plumbing to avoid early
# Wayland env races. Always use the launcher wrapper so startup, refresh and
# manual recovery all go through the same path.
exec-once = bash -lc "sleep 8; bash $scriptsDir/SessionStartupGuard.sh run-shell-always waybar '$HOME/.config/hypr/scripts/WaybarEnsure.sh ensure'"
exec-once = bash -lc "sleep 6; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal quickshell 'pgrep -x quickshell >/dev/null || qs -c overview >/dev/null 2>&1 &'"

# --- app placement ---
# Cold-start desktop layout. Manual restore stays on SUPER+CTRL+ALT+R.
exec-once = bash -lc "sleep 11; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal chrome-restore 'hyprctl dispatch exec \"[workspace 1 silent] $HOME/.local/bin/google-chrome-stable --restore-last-session\"'"
exec-once = bash -lc "sleep 13; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal code-restore 'hyprctl dispatch exec \"[workspace 2 silent] sh -lc '\\''/app/bin/code || code || code-oss || codium'\\''\"'"
exec-once = bash -lc "sleep 15; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal telegram-restore 'hyprctl dispatch exec \"[workspace 3 silent] sh -lc '\\''Telegram || telegram-desktop || telegram'\\''\"'"
exec-once = bash -lc "sleep 17; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal obsidian-restore 'hyprctl dispatch exec \"[workspace 4 silent] sh -lc '\\''obsidian || flatpak run md.obsidian.Obsidian'\\''\"'"
exec-once = bash -lc "sleep 19; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal fun-script '$HOME/.config/hypr/scripts/fun.sh'"
exec-once = bash -lc "sleep 12; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal session-autosave '$HOME/.config/hypr/UserScripts/SessionAutoSave.sh'"

# Wallet/keyring and local networking helper
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets
exec-once = bash -c "sleep 3; /home/goringich/.local/bin/disable-docker-bridges.sh"

# Keep NVIDIA fans active to avoid long passive heat spikes at idle/light load.
exec-once = bash -c "sleep 4; $HOME/.local/bin/nvidia-fan-mode.sh manual 35"
# Kick the Codex -> Obsidian sync service once per login so the user timer does
# not get stuck in an "elapsed" state after session start. Skip it during
# quarantine boots to keep recovery sessions quieter.
exec-once = bash -lc "sleep 6; bash $scriptsDir/SessionStartupGuard.sh run-shell-if-normal codex-obsidian-sync 'systemctl --user start codex-obsidian-sync.service >/dev/null 2>&1 || true'"
# Start the GPU watchdog once at login; the timer continues periodic checks.
exec-once = bash -c "sleep 7; systemctl --user start gpu-watchdog.service >/dev/null 2>&1 || true"
# Start the system watchdog once at login; the timer continues periodic checks.
exec-once = bash -c "sleep 9; systemctl --user start system-watchdog.service >/dev/null 2>&1 || true"
# Capture GPU health early in the session so bad PCIe retrains do not fail
# silently.
exec-once = bash -c "sleep 8; $HOME/.config/hypr/scripts/CheckGpuHealth.sh"
