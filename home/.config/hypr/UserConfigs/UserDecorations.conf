# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 3
  gaps_in = 4
  gaps_out = 8
  
  col.active_border = $color12 $color15 45deg
  col.inactive_border = $color10
}

decoration {
  rounding = 14
         
  active_opacity = 1.0
  inactive_opacity = 0.94
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.22
  dim_special = 0.8

  shadow {
    enabled = true
    range = 18
    render_power = 3

    color =  $color12
    color_inactive = $color10
  }


  blur {
    enabled = true	
    size = 10
    passes = 3
    vibrancy = 0.2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}

plugin {
  hyprbars {
    enabled = true
    bar_height = 30
    bar_part_of_window = true
    bar_precedence_over_border = true
    bar_blur = true
    bar_padding = 10
    bar_button_padding = 6
    bar_title_enabled = true
    bar_text_size = 11
    bar_text_align = left
    bar_text_font = FantasqueSansM Nerd Font Mono Bold
    bar_buttons_alignment = right
    icon_on_hover = false
    bar_color = $color0
    col.text = $color15
    inactive_button_color = $color10
  }
}
