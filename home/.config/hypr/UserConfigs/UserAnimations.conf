animations {
  enabled = yes

  bezier = wind, 0.08, 0.94, 0.14, 1.04
  bezier = winIn, 0.12, 1.15, 0.12, 1.03
  bezier = winOut, 0.34, -0.24, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = overshot, 0.18, 0.95, 0.12, 1.08
  bezier = smoothOut, 0.5, 0, 0.99, 0.99
  bezier = smoothIn, 0.2, 0.8, 0.24, 1.0
  
  animation = windows, 1, 8, wind, slide
  animation = windowsIn, 1, 7, winIn, popin 78%
  animation = windowsOut, 1, 5, winOut, popin 88%
  animation = windowsMove, 1, 7, wind, slide
  animation = border, 1, 3, smoothOut
  animation = borderangle, 1, 180, liner, loop #used by rainbow borders and rotating colors
  animation = fade, 1, 5, smoothOut
  animation = workspaces, 1, 7, overshot, slidefade 20%
  animation = specialWorkspace, 1, 7, overshot, slidefadevert 25%
  
  # animations for -git or version >0.42.0
  animation = workspacesIn, 1, 7, winIn, slidefade
  animation = workspacesOut, 1, 7, winOut, slidefade
}
