# Pick up the defaults first, then layer on just the overrides we actually tweak
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Ensure the defaults file is parsed before our lightweight overrides
source= $UserConfigs/01-UserDefaults.conf

### Custom overrides and additions ###

# Extra dabbling script
bind = SUPER_ALT, S, exec, $scriptsDir/fun.sh
bind = SUPER_ALT, A, exec, kitty --hold bash -lc "$scriptsDir/FunAudioTui.sh"

# VS Code shortcut that operates on its own combo
bind = $mainMod CTRL, C, exec, /home/goringich/.local/bin/code

# Command palette launcher (quick app/window/run switch)
# Remove default floating toggle from base config on the same combo
unbind = $mainMod, SPACE
bindd = $mainMod, SPACE, command palette, exec, pkill rofi || true && rofi -show drun -modi drun,run,window,filebrowser

# Replace default app launcher with a richer all-in-one rofi launcher
unbind = $mainMod, D
bindd = $mainMod, D, enhanced app launcher, exec, $scriptsDir/AppLauncher.sh
unbind = $mainMod, B
bindd = $mainMod, B, new Chrome window on current workspace, exec, $HOME/.local/bin/google-chrome-new-window

# Replace the default SUPER+T theme switcher with launching multiple Telegram windows
unbind = $mainMod, T
bindd = $mainMod, T, launch multiple Telegram windows, exec, $UserScripts/TelegramMultiWindow.sh

# Replace the random wallpaper binder with our custom script
unbind = CTRL ALT, W
bind = CTRL ALT, W, exec, $UserScripts/WallpaperRandom.sh

# Network debugging hotkeys (unique to the user config)
bind = $mainMod CTRL, N, exec, kitty -e $scriptsDir/NetworkDebug.sh
bind = $mainMod CTRL ALT, N, exec, kitty -e $scriptsDir/NetworkFix.sh

# Session controls (manual save/restore and workspace-5 dashboard)
bindd = $mainMod CTRL ALT, R, restore saved Hypr session, exec, $UserScripts/SessionRestore.sh
bindd = $mainMod CTRL ALT SHIFT, R, save current Hypr session, exec, $UserScripts/SessionSave.sh
bindd = $mainMod ALT, F5, workspace 5 monitoring dashboard, exec, $UserScripts/Workspace5Dashboard.sh

# Make the whole screen easier to read from a distance:
# SUPER + makes the interface larger (lower monitor scale), SUPER - makes it smaller.
# SUPER+SHIFT +/- uses temporary screen zoom.
bindd = $mainMod, minus, make interface smaller, exec, $scriptsDir/AdjustMonitorScale.sh up
bindd = $mainMod, equal, make interface larger, exec, $scriptsDir/AdjustMonitorScale.sh down
bindd = $mainMod, 0, reset interface scale, exec, $scriptsDir/AdjustMonitorScale.sh reset
bindd = $mainMod SHIFT, minus, zoom screen out, exec, $scriptsDir/ZoomScreen.sh out
bindd = $mainMod SHIFT, equal, zoom screen in, exec, $scriptsDir/ZoomScreen.sh in
bindd = $mainMod SHIFT, 0, reset screen zoom, exec, $scriptsDir/ZoomScreen.sh reset
