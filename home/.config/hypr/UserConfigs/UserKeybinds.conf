# Pick up the defaults first, then layer on just the overrides we actually tweak
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Ensure the defaults file is parsed before our lightweight overrides
source= $UserConfigs/01-UserDefaults.conf

### Custom overrides and additions ###

# Extra dabbling script
bind = SUPER_ALT, S, exec, $scriptsDir/fun.sh

# VS Code shortcut that operates on its own combo
bind = $mainMod CTRL, C, exec, sh -c '/app/bin/code || code || code-oss || codium'

# Replace the default SUPER+T theme switcher with launching Telegram
unbind = $mainMod, T
bind = $mainMod, T, exec, sh -c 'Telegram || telegram-desktop || telegram'

# Replace the random wallpaper binder with our custom script
unbind = CTRL ALT, W
bind = CTRL ALT, W, exec, $UserScripts/Wallpapeee3232323233332rRandom.sh

# Network debugging hotkeys (unique to the user config)
bind = $mainMod CTRL, N, exec, kitty -e $scriptsDir/NetworkDebug.sh
bind = $mainMod CTRL ALT, N, exec, kitty -e $scriptsDir/NetworkFix.sh
