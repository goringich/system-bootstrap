name: local-ai-open-webui

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-ai-open-webui
    restart: unless-stopped
    network_mode: host
    environment:
      HOST: 127.0.0.1
      PORT: 3030
      WEBUI_AUTH: "true"
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      ENABLE_RAG_WEB_SEARCH: "false"
      ENABLE_RAG_HYBRID_SEARCH: "true"
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: nomic-embed-text:latest
      DEFAULT_MODELS: mdq100/qwen3.5-coder:35b
      TASK_MODEL: gpt-oss:20b
      TITLE_GENERATION_PROMPT_TEMPLATE: |
        Create a concise title for this chat in the same language as the user.
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
    name: local-ai-open-webui-data
